name: Release DMG

# Baut Nook und veröffentlicht eine .dmg am GitHub-Release, sobald ein
# Versions-Tag (z. B. v1.0.0) gepusht wird. Manuell auslösbar über den
# „Run workflow"-Knopf (workflow_dispatch).
#
# Hinweis: Die App wird NICHT signiert/notarisiert (kein Apple-Account nötig).
# Nutzer bestätigen beim ersten Start einmalig „Trotzdem öffnen".

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # nötig, um ein Release + Asset anzulegen

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Neuestes stabiles Xcode wählen
        run: sudo xcode-select -switch "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Diagnose — Xcode & verfügbare SDKs
        run: |
          xcodebuild -version
          echo "--- SDKs ---"
          xcodebuild -showsdks

      - name: dmgbuild installieren (schöner Installer)
        run: pip3 install --break-system-packages dmgbuild

      - name: DMG bauen
        run: ./scripts/build-dmg.sh

      # Bei manuellen Läufen (ohne Tag): DMG als herunterladbares Artefakt
      # ablegen, damit man die Pipeline testen kann, ohne ein Release zu schneiden.
      - name: DMG als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Nook-dmg
          path: Nook-*.dmg

      - name: Appcast signieren und committen (Sparkle)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Sparkle-Werkzeuge holen
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          # DMG in eigenen Ordner, signierten Appcast erzeugen (Key von stdin)
          mkdir -p /tmp/cast && cp Nook-*.dmg /tmp/cast/
          PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | /tmp/sparkle/bin/generate_appcast \
            --ed-key-file - --download-url-prefix "$PREFIX" /tmp/cast
          # appcast.xml nach main committen (Feed-URL zeigt auf raw main)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/cast/appcast.xml appcast.xml
          git add appcast.xml
          git commit -m "CI: appcast für ${GITHUB_REF_NAME}" || echo "keine Änderung am Appcast"
          git push origin main

      - name: Release erstellen und DMG anhängen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Nook-*.dmg
          generate_release_notes: true
          body: |
            ### Installation

            1. `.dmg` öffnen und **Nook** in den Programme-Ordner ziehen.
            2. Beim ersten Start erscheint „**Nook kann nicht auf Schadsoftware
               überprüft werden**" — das ist normal, die App ist noch nicht
               signiert (Hobby-Projekt).
            3. **Systemeinstellungen → Datenschutz & Sicherheit** öffnen, nach
               unten scrollen und bei Nook auf „**Trotzdem öffnen**" klicken.

            Ab dieser Version aktualisiert sich Nook **automatisch** (Sparkle) —
            künftige Updates kommen ohne erneuten Download.

            > Die App ist quelloffen einsehbar — du kannst sie auch selbst in
            > Xcode bauen (siehe README).
